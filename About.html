<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Us | ConvertCCY – Live Currency Converter</title>
<meta name="description" content="Learn about ConvertCCY, the free and accurate currency converter providing live exchange rates for 120+ world currencies.">
<link rel="canonical" href="https://convertccy.com/about.html">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f7f7f5;--surface:#fff;--border:#e8e8e4;--text:#111110;--muted:#888884;--accent:#1a6b3c;--accent-light:#e8f5ee;--mono:'DM Mono',monospace;--sans:'Sora',sans-serif}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.8}
  nav{position:sticky;top:0;z-index:100;background:rgba(247,247,245,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px}
  .logo{font-family:var(--mono);font-size:1.1rem;font-weight:500;color:var(--text);text-decoration:none}
  .logo span{color:var(--accent)}
  .nav-links a{font-size:.82rem;color:var(--muted);text-decoration:none;margin-left:1.5rem}
  .nav-links a:hover{color:var(--text)}
  .page-wrap{max-width:720px;margin:0 auto;padding:4rem 2rem}
  .tag{display:inline-block;background:var(--accent-light);color:var(--accent);font-family:var(--mono);font-size:.75rem;padding:4px 12px;border-radius:100px;margin-bottom:1.5rem;border:1px solid #c4dfd0}
  h1{font-size:2.5rem;font-weight:700;letter-spacing:-1.5px;margin-bottom:1rem;line-height:1.1}
  h1 em{font-style:normal;color:var(--accent)}
  h2{font-size:1.2rem;font-weight:700;letter-spacing:-.5px;margin:2.5rem 0 .75rem}
  p{color:var(--muted);margin-bottom:1rem;font-size:.95rem}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;margin:2rem 0}
  .values-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-top:1rem}
  .value-item{background:var(--accent-light);border:1px solid #c4dfd0;border-radius:12px;padding:1.2rem}
  .value-icon{font-size:1.5rem;margin-bottom:.5rem}
  .value-title{font-weight:700;font-size:.9rem;margin-bottom:.3rem}
</style>
</head>
</html>
